<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家計分析ダッシュボード 2025年度</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:14px}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);color:#fff;padding:20px 28px}
.header h1{font-size:22px;font-weight:600}
.header p{font-size:13px;opacity:.7;margin-top:2px}
.container{max-width:1440px;margin:0 auto;padding:20px}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:#fff;border-radius:10px;padding:4px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tab{padding:10px 20px;border:none;background:none;cursor:pointer;border-radius:8px;font-size:13px;font-weight:500;color:#666;transition:.2s}
.tab.active{background:#1a1a2e;color:#fff}
.tab:hover:not(.active){background:#f0f2f5}
.panel{display:none}.panel.active{display:block}
#panel-mapping.active{display:flex !important}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:#fff;border-radius:10px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.kpi .label{font-size:11px;color:#888;letter-spacing:.5px}
.kpi .value{font-size:24px;font-weight:700;margin-top:2px}
.kpi .sub{font-size:11px;color:#aaa;margin-top:2px}
.green{color:#27ae60}.red{color:#e74c3c}.orange{color:#f39c12}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:20px}
.card h2{font-size:15px;font-weight:600;margin-bottom:14px;color:#1a1a2e}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:960px){.grid-2{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1a1a2e;color:#fff;padding:8px 10px;text-align:left;font-weight:500;position:sticky;top:0;z-index:2;white-space:nowrap}
th.r,td.r{text-align:right}
th.c,td.c{text-align:center}
td{padding:6px 10px;border-bottom:1px solid #eee}
tr:hover{background:#f8f9fa}
.section-row{background:#2c3e50;color:#fff;font-weight:600}
.section-row td{padding:5px 10px;font-size:11px}
canvas{max-height:320px}
.note{font-size:10px;color:#aaa}

/* Mapping UI */
.budget-grid{display:grid;gap:12px}
.budget-item{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px 16px;transition:.2s}
.budget-item:hover{border-color:#3498db}
.budget-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.budget-item-name{font-weight:600;font-size:14px}
.budget-item-budget{font-size:13px;color:#2980b9;font-weight:600}
.budget-item-cycle{font-size:10px;color:#999;background:#f0f2f5;padding:2px 8px;border-radius:8px}
.mapping-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:14px;font-size:11px;cursor:pointer;border:1px solid #ddd;background:#fff;transition:.15s;user-select:none}
.chip:hover{border-color:#3498db;background:#ebf5fb}
.chip.selected{background:#2980b9;color:#fff;border-color:#2980b9}
.chip .chip-cat{opacity:.6;font-size:10px}
.result-table{margin-top:10px}
.result-table td{padding:4px 8px;font-size:12px}
.result-table .brow{color:#2980b9;font-size:11px}
.result-table .drow td{border-bottom:2px solid #ddd;font-size:11px}
.over{color:#e74c3c;font-weight:600}
.under{color:#27ae60}
.summary-bar{display:flex;gap:16px;align-items:center;padding:12px 16px;background:#f8f9fa;border-radius:8px;margin-bottom:16px;flex-wrap:wrap}
.summary-bar .stat{font-size:13px}
.summary-bar .stat strong{font-size:16px}
.btn{padding:8px 18px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:.2s}
.btn-primary{background:#1a1a2e;color:#fff}.btn-primary:hover{background:#2c3e50}
.btn-secondary{background:#eee;color:#333}.btn-secondary:hover{background:#ddd}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.btn-danger{background:#fce4ec;color:#c0392b;border:1px solid #f5c6cb}.btn-danger:hover{background:#f5c6cb}
.btn-add{background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9;font-size:12px;padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:600;transition:.2s}
.btn-add:hover{background:#c8e6c9}
.edit-icon{cursor:pointer;font-size:13px;opacity:.5;transition:.2s;margin-left:6px}
.edit-icon:hover{opacity:1}

/* Budget Edit Modal */
.edit-modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:110;justify-content:center;align-items:center}
.edit-modal-overlay.open{display:flex}
.edit-modal{background:#fff;border-radius:14px;width:90%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:24px}
.edit-modal h3{font-size:16px;font-weight:600;margin-bottom:16px;color:#1a1a2e}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#3498db}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.unmapped-section{padding:14px 18px;background:#fff8e1;border:1px solid #ffe082;border-radius:10px;position:sticky;top:0;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.unmapped-section h3{font-size:14px;color:#f57f17;margin-bottom:6px}
.unmapped-section.collapsed .mapping-chips{display:none}
.unmapped-section.collapsed .unmapped-desc{display:none}
.unmapped-toggle{border:none;background:none;cursor:pointer;font-size:12px;color:#f57f17;font-weight:600;padding:0;margin-left:8px}
.mapping-scroll{overflow-y:auto;flex:1}
.cycle-header{padding:10px 16px;background:#34495e;color:#fff;border-radius:8px;margin:12px 0 8px;font-size:13px;font-weight:600}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;width:90%;max-width:720px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid #eee}
.modal-header h3{font-size:16px;font-weight:600;color:#1a1a2e}
.modal-close{width:32px;height:32px;border:none;background:#f0f2f5;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:.15s}
.modal-close:hover{background:#e0e0e0}
.modal-body{padding:18px 22px;overflow-y:auto;flex:1}
.modal-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.modal-stat{background:#f8f9fa;border-radius:8px;padding:10px 14px}
.modal-stat .ms-label{font-size:10px;color:#888}
.modal-stat .ms-value{font-size:18px;font-weight:700;margin-top:2px}
.modal-monthly{display:flex;gap:4px;align-items:flex-end;height:80px;margin-bottom:16px;padding:0 4px}
.modal-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.modal-bar{background:#3498db;border-radius:3px 3px 0 0;width:100%;min-height:2px;transition:.3s}
.modal-bar-label{font-size:9px;color:#888}
.modal-bar-val{font-size:9px;color:#333;font-weight:600}
.modal-tx-table{font-size:12px}
.modal-tx-table th{background:#f0f2f5;color:#333;padding:6px 10px;font-size:11px;position:static}
.modal-tx-table td{padding:5px 10px}
.modal-tx-table tr:nth-child(even){background:#fafafa}
.chip.unmapped{cursor:pointer;transition:.2s}
.chip.unmapped:hover{transform:scale(1.05);box-shadow:0 2px 8px rgba(0,0,0,.15)}
</style>
</head>
<body>
<div class="header">
<h1>家計分析ダッシュボード</h1>
<p>2025年4月〜2026年2月（11ヶ月間）| マネーフォワードMeデータ</p>
</div>
<div class="container">

<div class="tabs">
<button class="tab active" data-tab="summary">サマリー</button>
<button class="tab" data-tab="mapping">予算マッピング</button>
<button class="tab" data-tab="result">予算対比レポート</button>
</div>

<!-- ===== Panel 1: Summary ===== -->
<div class="panel active" id="panel-summary">
<div class="kpi-row">
<div class="kpi"><div class="label">総収入</div><div class="value green" id="k-inc"></div><div class="sub">11ヶ月合計</div></div>
<div class="kpi"><div class="label">総支出</div><div class="value red" id="k-exp"></div><div class="sub">11ヶ月合計</div></div>
<div class="kpi"><div class="label">収支差額</div><div class="value" id="k-bal"></div><div class="sub">貯蓄額（振替除く）</div></div>
<div class="kpi"><div class="label">月平均支出</div><div class="value" id="k-avg"></div><div class="sub">11ヶ月平均</div></div>
</div>
<div class="grid-2">
<div class="card"><h2>月次 収入 vs 支出</h2><canvas id="c-monthly"></canvas></div>
<div class="card"><h2>大項目別 支出構成</h2><canvas id="c-pie"></canvas></div>
</div>
<div class="card"><h2>大項目別 月次推移（積み上げ）</h2><canvas id="c-stacked"></canvas></div>
</div>

<!-- ===== Panel 2: Mapping ===== -->
<div class="panel" id="panel-mapping" style="display:none;flex-direction:column;height:calc(100vh - 160px)">
<div class="unmapped-section" id="unmapped-section">
<div style="display:flex;align-items:center;justify-content:space-between">
<h3 style="margin:0">どの予算にも紐づいていない中項目 <span id="unmapped-count" style="font-size:12px;font-weight:400"></span></h3>
<button class="unmapped-toggle" id="unmapped-toggle">折りたたむ ▲</button>
</div>
<p class="unmapped-desc" style="font-size:12px;color:#888;margin:6px 0 8px">クリックで明細を確認できます。上の予算項目のチップを選んで割り当ててください。</p>
<div id="unmapped-list" class="mapping-chips"></div>
</div>
<div class="card mapping-scroll" style="margin-top:12px;flex:1;overflow-y:auto">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
<div>
<h2 style="margin-bottom:4px">予算マッピング設定</h2>
<p style="font-size:12px;color:#888">中項目チップを選択して予算に紐づけ。費目名・金額をクリックで編集。</p>
</div>
<button class="btn-add" id="btn-add-budget">＋ 予算を追加</button>
</div>
<div id="mapping-container" class="budget-grid"></div>
</div>
</div>

<!-- ===== Panel 3: Result ===== -->
<div class="panel" id="panel-result">
<div class="card">
<h2>予算対比レポート</h2>
<div class="summary-bar" id="result-summary"></div>
<div style="overflow-x:auto;max-height:800px;overflow-y:auto">
<table><thead><tr id="result-header"></tr></thead><tbody id="tb-result"></tbody></table>
</div>
</div>
</div>

</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal-overlay">
<div class="modal">
<div class="modal-header">
<h3 id="modal-title"></h3>
<button class="modal-close" id="modal-close">&times;</button>
</div>
<div class="modal-body" id="modal-body"></div>
</div>
</div>

<!-- Budget Edit Modal -->
<div class="edit-modal-overlay" id="edit-modal-overlay">
<div class="edit-modal">
<h3 id="edit-modal-title">予算を追加</h3>
<div class="form-group">
<label>費目名</label>
<input type="text" id="edit-name" placeholder="例: 日用品">
</div>
<div class="form-group">
<label>月額予算（円）</label>
<input type="number" id="edit-monthly" placeholder="例: 10000">
</div>
<div class="form-group">
<label>周期</label>
<select id="edit-cycle">
<option value="毎月・固定">毎月・固定</option>
<option value="毎月・変動">毎月・変動</option>
<option value="不定期・固定">不定期・固定</option>
<option value="不定期・変動">不定期・変動</option>
</select>
</div>
<div class="form-actions">
<button class="btn btn-danger" id="edit-delete" style="margin-right:auto;display:none">削除</button>
<button class="btn btn-secondary" id="edit-cancel">キャンセル</button>
<button class="btn btn-primary" id="edit-save">保存</button>
</div>
</div>
</div>

// --- Mapping state: budgetId -> Set of "大項目|中項目" keys ---
let mappingState = {};

function initMapping() {
  // Try load from variable (no localStorage in this env)
  BUDGETS.forEach(b => {
    mappingState[b.id] = new Set(b.default.map(([maj,min]) => maj + '|' + min));
  });
}
initMapping();

function getAssignedKeys() {
  const all = new Set();
  Object.values(mappingState).forEach(s => s.forEach(k => all.add(k)));
  return all;
}

// --- Render mapping UI ---
function renderMapping() {
  const container = document.getElementById('mapping-container');
  container.innerHTML = '';

  const cycles = ['毎月・固定', '毎月・変動', '不定期・固定', '不定期・変動'];
  cycles.forEach(cycle => {
    const items = BUDGETS.filter(b => b.cycle === cycle);
    if (!items.length) return;
    const hdr = document.createElement('div');
    hdr.className = 'cycle-header';
    hdr.textContent = cycle;
    container.appendChild(hdr);

    items.forEach(b => {
      const div = document.createElement('div');
      div.className = 'budget-item';
      div.innerHTML = `
        <div class="budget-item-header">
          <span class="budget-item-name" style="cursor:pointer" title="クリックで編集">${b.name}<span class="edit-icon">✎</span></span>
          <span class="budget-item-budget" style="cursor:pointer" title="クリックで編集">¥${fmt(b.monthly)}/月（年 ¥${fmt(b.monthly*12)}）</span>
        </div>
        <div class="mapping-chips" id="chips-${b.id}"></div>
      `;
      div.querySelector('.budget-item-name').addEventListener('click', () => openEditModal(b.id));
      div.querySelector('.budget-item-budget').addEventListener('click', () => openEditModal(b.id));
      container.appendChild(div);

      const chipsDiv = div.querySelector('.mapping-chips');
      allChips.forEach(c => {
        const chip = document.createElement('span');
        chip.className = 'chip' + (mappingState[b.id].has(c.key) ? ' selected' : '');
        chip.innerHTML = `<span class="chip-cat">${c.major}/</span>${c.minor}`;
        chip.dataset.key = c.key;
        chip.dataset.budget = b.id;
        chip.addEventListener('click', () => toggleChip(b.id, c.key, chip));
        chipsDiv.appendChild(chip);
      });
    });
  });

  renderUnmapped();
}

function toggleChip(budgetId, chipKey, chipEl) {
  // Remove from any other budget first
  Object.keys(mappingState).forEach(bid => {
    if (bid !== budgetId && mappingState[bid].has(chipKey)) {
      mappingState[bid].delete(chipKey);
    }
  });

  if (mappingState[budgetId].has(chipKey)) {
    mappingState[budgetId].delete(chipKey);
  } else {
    mappingState[budgetId].add(chipKey);
  }

  // Re-render all chips to update selections
  document.querySelectorAll('.chip').forEach(c => {
    const key = c.dataset.key;
    const bid = c.dataset.budget;
    c.classList.toggle('selected', mappingState[bid] && mappingState[bid].has(key));
  });
  renderUnmapped();
}

function renderUnmapped() {
  const assigned = getAssignedKeys();
  const list = document.getElementById('unmapped-list');
  list.innerHTML = '';
  let count = 0;
  allChips.forEach(c => {
    if (assigned.has(c.key)) return;
    count++;
    const total = Object.values(D.category_data[c.major][c.minor]).reduce((a,b)=>a+b,0);
    if (total === 0) return;
    const chip = document.createElement('span');
    chip.className = 'chip unmapped';
    chip.style.background = '#fff3cd';
    chip.style.borderColor = '#ffe082';
    chip.innerHTML = `<span class="chip-cat">${c.major}/</span>${c.minor} <strong>¥${fmt(total)}</strong>`;
    chip.addEventListener('click', () => openDetailModal(c.major, c.minor));
    list.appendChild(chip);
  });
  const visibleCount = list.childElementCount;
  document.getElementById('unmapped-count').textContent = `(${visibleCount}件)`;
  document.getElementById('unmapped-section').style.display = visibleCount > 0 ? 'block' : 'none';
}

// --- Detail Modal ---
const modalOverlay = document.getElementById('modal-overlay');
document.getElementById('modal-close').addEventListener('click', () => modalOverlay.classList.remove('open'));
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) modalOverlay.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') modalOverlay.classList.remove('open'); });

function openDetailModal(major, minor) {
  const key = major + '|' + minor;
  const monthlyData = D.category_data[major][minor];
  const transactions = TX[key] || [];
  const total = Object.values(monthlyData).reduce((a,b)=>a+b,0);
  const avg = Math.round(total / MONTHS.length);
  const maxMonth = Math.max(...MONTHS.map(m => monthlyData[m] || 0));
  const activeMonths = MONTHS.filter(m => (monthlyData[m] || 0) > 0).length;

  document.getElementById('modal-title').textContent = major + ' / ' + minor;

  let html = '';

  // Summary stats
  html += '<div class="modal-summary">';
  html += `<div class="modal-stat"><div class="ms-label">合計（11ヶ月）</div><div class="ms-value">¥${fmt(total)}</div></div>`;
  html += `<div class="modal-stat"><div class="ms-label">月平均</div><div class="ms-value">¥${fmt(avg)}</div></div>`;
  html += `<div class="modal-stat"><div class="ms-label">発生月数</div><div class="ms-value">${activeMonths} / ${MONTHS.length}</div></div>`;
  html += `<div class="modal-stat"><div class="ms-label">取引件数</div><div class="ms-value">${transactions.length}件</div></div>`;
  html += '</div>';

  // Monthly bar chart (simple HTML)
  html += '<div style="font-size:12px;font-weight:600;margin-bottom:6px;color:#555">月別推移</div>';
  html += '<div class="modal-monthly">';
  MONTHS.forEach(m => {
    const v = monthlyData[m] || 0;
    const h = maxMonth > 0 ? Math.max(v / maxMonth * 60, v > 0 ? 4 : 1) : 1;
    const color = v === 0 ? '#eee' : '#3498db';
    html += `<div class="modal-bar-wrap">
      <div class="modal-bar-val">${v > 0 ? (v >= 10000 ? Math.round(v/1000)+'k' : fmt(v)) : ''}</div>
      <div class="modal-bar" style="height:${h}px;background:${color}"></div>
      <div class="modal-bar-label">${shortM(m).slice(3)}</div>
    </div>`;
  });
  html += '</div>';

  // Suggest which budget it might belong to
  html += '<div style="font-size:12px;font-weight:600;margin-bottom:6px;color:#555">振り分け候補</div>';
  html += '<div style="margin-bottom:16px;font-size:12px;color:#666">';
  const suggestions = suggestBudget(major, minor, avg, total);
  if (suggestions.length > 0) {
    suggestions.forEach(s => {
      html += `<div style="display:inline-block;padding:4px 12px;margin:2px 4px;background:#e8f5e9;border-radius:12px;font-size:11px">
        <strong>${s.name}</strong> <span style="color:#888">(月予算 ¥${fmt(s.monthly)})</span> — ${s.reason}</div>`;
    });
  } else {
    html += '<span style="color:#999">候補なし。新しい予算項目の作成を検討してください。</span>';
  }
  html += '</div>';

  // Transaction list
  html += '<div style="font-size:12px;font-weight:600;margin-bottom:6px;color:#555">取引明細（直近）</div>';
  html += '<div style="max-height:280px;overflow-y:auto">';
  html += '<table class="modal-tx-table"><thead><tr><th>日付</th><th>内容</th><th class="r">金額</th><th>メモ</th></tr></thead><tbody>';
  const showTx = transactions.slice(0, 50);
  showTx.forEach(tx => {
    html += `<tr><td style="white-space:nowrap">${tx.date}</td><td>${tx.desc || '-'}</td><td class="r">¥${fmt(tx.amount)}</td><td style="color:#888">${tx.memo || ''}</td></tr>`;
  });
  if (transactions.length > 50) {
    html += `<tr><td colspan="4" style="color:#888;text-align:center">...他 ${transactions.length - 50} 件</td></tr>`;
  }
  html += '</tbody></table></div>';

  document.getElementById('modal-body').innerHTML = html;
  modalOverlay.classList.add('open');
}

function suggestBudget(major, minor, avg, total) {
  const suggestions = [];
  BUDGETS.forEach(b => {
    let score = 0;
    let reason = '';
    // Same major category in defaults
    const defaultMajors = b.default.map(d => d[0]);
    if (defaultMajors.includes(major)) {
      score += 3;
      reason = '同じ大項目の予算';
    }
    // Keyword matching
    const keywords = {
      '美容': ['salon','clothes','massage'],
      '医療': ['medicine','contact'],
      '車': ['parking','gasoline','cartax','car_ins','shaken','maintain','tire'],
      '自動車': ['parking','gasoline','cartax','car_ins','shaken','maintain','tire'],
      '通信': ['internet','phone','iphone','server'],
      '食': ['shared'],
      '教育': ['libecity'],
      '趣味': ['okozukai'],
      '娯楽': ['okozukai'],
      '旅行': ['travel'],
      '交際': ['travel','present'],
      '税': ['furusato'],
      '住宅': ['rent','town','fire_ins'],
      '光熱': ['electric','gas','water','nhk'],
      '家電': ['appliance'],
      '家具': ['appliance'],
    };
    Object.entries(keywords).forEach(([kw, ids]) => {
      if ((major + minor).includes(kw) && ids.includes(b.id)) {
        score += 2;
        reason = reason || 'カテゴリ名が類似';
      }
    });
    // If okozukai and it's 趣味・娯楽
    if (major === '趣味・娯楽' && b.id === 'okozukai') {
      score += 2;
      reason = reason || 'おこづかい関連の可能性';
    }
    if (score > 0) suggestions.push({ ...b, score, reason });
  });
  suggestions.sort((a,b) => b.score - a.score);
  return suggestions.slice(0, 3);
}

// --- Result table ---
function renderResult() {
  const hdr = document.getElementById('result-header');
  hdr.innerHTML = '<th>予算項目</th><th>集計対象</th>';
  MONTHS.forEach(m => hdr.innerHTML += '<th class="r">' + shortM(m) + '</th>');
  hdr.innerHTML += '<th class="r">合計</th><th class="r">予算(11ヶ月)</th><th class="r">差額</th><th class="c">達成率</th>';

  const tb = document.getElementById('tb-result');
  tb.innerHTML = '';

  let grandActual = 0, grandBudget = 0;
  let overCount = 0, totalTracked = 0;
  let currentCycle = '';

  BUDGETS.forEach(b => {
    if (b.cycle !== currentCycle) {
      currentCycle = b.cycle;
      const sr = document.createElement('tr'); sr.className = 'section-row';
      sr.innerHTML = `<td colspan="${MONTHS.length + 5}">${currentCycle}</td>`;
      tb.appendChild(sr);
    }

    const keys = [...mappingState[b.id]];
    const monthlyVals = MONTHS.map(m => {
      let sum = 0;
      keys.forEach(k => {
        const [maj, min] = k.split('|');
        if (D.category_data[maj] && D.category_data[maj][min]) sum += D.category_data[maj][min][m] || 0;
      });
      return sum;
    });
    const total = monthlyVals.reduce((a,b2)=>a+b2,0);
    const budgetTotal = b.monthly * MONTHS.length;
    const diff = budgetTotal - total;
    const pct = budgetTotal > 0 ? Math.round(total / budgetTotal * 100) : 0;

    grandActual += total;
    grandBudget += budgetTotal;
    if (keys.length > 0) {
      totalTracked++;
      if (pct > 100) overCount++;
    }

    const chipLabels = keys.map(k => { const [maj,min] = k.split('|'); return min; }).join(', ') || '<span class="note">未設定</span>';

    const tr = document.createElement('tr');
    let html = `<td style="font-weight:600">${b.name}</td>`;
    html += `<td style="font-size:11px;color:#666;max-width:160px">${chipLabels}</td>`;

    monthlyVals.forEach(v => {
      const isOver = v > b.monthly;
      html += `<td class="r" style="${isOver ? 'color:#e74c3c;font-weight:600' : ''}">${v ? fmt(v) : '-'}</td>`;
    });

    html += `<td class="r" style="font-weight:600">${fmt(total)}</td>`;
    html += `<td class="r" style="color:#2980b9">${fmt(budgetTotal)}</td>`;
    html += `<td class="r" style="color:${diff>=0?'#27ae60':'#e74c3c'};font-weight:600">${(diff>=0?'+':'')+fmt(diff)}</td>`;

    let badge;
    if (keys.length === 0) badge = '<span style="color:#999">—</span>';
    else if (pct <= 90) badge = '<span style="color:#27ae60;font-weight:700">◎ '+pct+'%</span>';
    else if (pct <= 100) badge = '<span style="color:#f39c12;font-weight:700">○ '+pct+'%</span>';
    else badge = '<span style="color:#e74c3c;font-weight:700">× '+pct+'%</span>';
    html += `<td class="c">${badge}</td>`;

    tr.innerHTML = html;
    tb.appendChild(tr);
  });

  // Unmapped total
  const assigned = getAssignedKeys();
  let unmappedTotal = 0;
  const unmappedMonthly = MONTHS.map(() => 0);
  allChips.forEach(c => {
    if (assigned.has(c.key)) return;
    MONTHS.forEach((m, i) => {
      const v = D.category_data[c.major][c.minor][m] || 0;
      unmappedMonthly[i] += v;
      unmappedTotal += v;
    });
  });

  if (unmappedTotal > 0) {
    const ur = document.createElement('tr');
    ur.style.background = '#fff8e1';
    let uhtml = '<td style="font-weight:600;color:#f57f17">予算外支出</td><td class="note">未割当の中項目合計</td>';
    unmappedMonthly.forEach(v => uhtml += `<td class="r" style="color:#f57f17">${v?fmt(v):'-'}</td>`);
    uhtml += `<td class="r" style="font-weight:600;color:#f57f17">${fmt(unmappedTotal)}</td><td></td><td></td><td></td>`;
    ur.innerHTML = uhtml;
    tb.appendChild(ur);
  }

  // Grand total
  const gr = document.createElement('tr');
  gr.style.background = '#f0f2f5';
  gr.style.fontWeight = '700';
  const gMonthly = MONTHS.map((m, i) => {
    let sum = 0;
    BUDGETS.forEach(b => {
      [...mappingState[b.id]].forEach(k => {
        const [maj, min] = k.split('|');
        if (D.category_data[maj] && D.category_data[maj][min]) sum += D.category_data[maj][min][m] || 0;
      });
    });
    return sum + unmappedMonthly[i];
  });
  let ghtml = '<td>総合計</td><td></td>';
  gMonthly.forEach(v => ghtml += `<td class="r">${fmt(v)}</td>`);
  ghtml += `<td class="r">${fmt(grandActual + unmappedTotal)}</td><td class="r" style="color:#2980b9">${fmt(grandBudget)}</td>`;
  const gDiff = grandBudget - grandActual;
  ghtml += `<td class="r" style="color:${gDiff>=0?'#27ae60':'#e74c3c'}">${(gDiff>=0?'+':'')+fmt(gDiff)}</td><td></td>`;
  gr.innerHTML = ghtml;
  tb.appendChild(gr);

  // Summary bar
  document.getElementById('result-summary').innerHTML = `
    <div class="stat">予算合計: <strong style="color:#2980b9">¥${fmt(grandBudget)}</strong></div>
    <div class="stat">実績合計: <strong>¥${fmt(grandActual)}</strong></div>
    <div class="stat">差額: <strong style="color:${gDiff>=0?'#27ae60':'#e74c3c'}">${(gDiff>=0?'+':'')}¥${fmt(gDiff)}</strong></div>
    <div class="stat">予算外: <strong style="color:#f57f17">¥${fmt(unmappedTotal)}</strong></div>
    <div class="stat">超過項目: <strong class="red">${overCount}/${totalTracked}</strong></div>
  `;
}

// --- Budget Edit Modal ---
const editOverlay = document.getElementById('edit-modal-overlay');
const editTitle = document.getElementById('edit-modal-title');
const editName = document.getElementById('edit-name');
const editMonthly = document.getElementById('edit-monthly');
const editCycle = document.getElementById('edit-cycle');
const editDelete = document.getElementById('edit-delete');
let editingBudgetId = null;

function closeEditModal() { editOverlay.classList.remove('open'); editingBudgetId = null; }
document.getElementById('edit-cancel').addEventListener('click', closeEditModal);
editOverlay.addEventListener('click', e => { if (e.target === editOverlay) closeEditModal(); });

document.getElementById('btn-add-budget').addEventListener('click', () => {
  editingBudgetId = null;
  editTitle.textContent = '予算を追加';
  editName.value = '';
  editMonthly.value = '';
  editCycle.value = '毎月・変動';
  editDelete.style.display = 'none';
  editOverlay.classList.add('open');
  editName.focus();
});

function openEditModal(budgetId) {
  const b = BUDGETS.find(x => x.id === budgetId);
  if (!b) return;
  editingBudgetId = budgetId;
  editTitle.textContent = '予算を編集';
  editName.value = b.name;
  editMonthly.value = b.monthly;
  editCycle.value = b.cycle;
  editDelete.style.display = 'inline-block';
  editOverlay.classList.add('open');
  editName.focus();
}

document.getElementById('edit-save').addEventListener('click', () => {
  const name = editName.value.trim();
  const monthly = parseInt(editMonthly.value);
  const cycle = editCycle.value;
  if (!name || isNaN(monthly) || monthly < 0) { alert('費目名と月額予算を入力してください'); return; }

  if (editingBudgetId) {
    const b = BUDGETS.find(x => x.id === editingBudgetId);
    b.name = name;
    b.monthly = monthly;
    b.cycle = cycle;
  } else {
    const newId = 'custom_' + Date.now();
    BUDGETS.push({ id: newId, name, monthly, cycle, default: [] });
    mappingState[newId] = new Set();
  }
  closeEditModal();
  renderMapping();
  renderResult();
});

editDelete.addEventListener('click', () => {
  if (!editingBudgetId) return;
  const b = BUDGETS.find(x => x.id === editingBudgetId);
  if (!confirm(`「${b.name}」を削除しますか？`)) return;
  const idx = BUDGETS.findIndex(x => x.id === editingBudgetId);
  BUDGETS.splice(idx, 1);
  delete mappingState[editingBudgetId];
  closeEditModal();
  renderMapping();
  renderResult();
});

renderMapping();
renderResult();
</script>
